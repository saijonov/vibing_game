<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ember — a countdown that breathes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient backdrop layers -->
  <div class="aura" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="stage" data-phase="idle">

    <header class="brand">
      <div class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.45"/>
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
        </svg>
      </div>
      <div class="brand__text">
        <span class="brand__name">EMBER</span>
        <span class="brand__sub">countdown · v1</span>
      </div>
      <div class="brand__status" id="statusLabel">
        <span class="dot" aria-hidden="true"></span>
        <span class="status__text">ready</span>
      </div>
    </header>

    <section class="dial" aria-label="Countdown timer">
      <!-- Halo glow that intensifies with urgency -->
      <div class="dial__halo" aria-hidden="true"></div>

      <!-- Progress ring -->
      <svg class="ring" viewBox="0 0 320 320" aria-hidden="true">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"  stop-color="var(--ring-a)"/>
            <stop offset="100%" stop-color="var(--ring-b)"/>
          </linearGradient>
          <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <!-- ticks -->
        <g class="ring__ticks" id="ringTicks"></g>

        <!-- guide track -->
        <circle class="ring__track" cx="160" cy="160" r="138" />

        <!-- depleting stroke -->
        <circle
          class="ring__stroke"
          id="ringStroke"
          cx="160" cy="160" r="138"
          filter="url(#ringGlow)"
        />

        <!-- glowing head dot rides the tip -->
        <g class="ring__head" id="ringHead">
          <circle r="7" class="ring__head-glow"/>
          <circle r="3.5" class="ring__head-core"/>
        </g>
      </svg>

      <!-- Particle burst layer (drawn on completion) -->
      <canvas class="burst" id="burst" width="640" height="640" aria-hidden="true"></canvas>

      <!-- Center display -->
      <div class="display" id="display">
        <div class="display__hint" id="hint">click numbers to edit</div>

        <div class="display__time" role="group" aria-label="time">
          <span class="seg" data-unit="m" tabindex="0" role="spinbutton"
                aria-label="minutes" id="segM">25</span>
          <span class="colon" id="colon">:</span>
          <span class="seg" data-unit="s" tabindex="0" role="spinbutton"
                aria-label="seconds" id="segS">00</span>
        </div>

        <div class="display__meta">
          <span class="meta__label" id="metaLeft">duration</span>
          <span class="meta__sep">·</span>
          <span class="meta__value" id="metaRight">elapsed 0%</span>
        </div>

        <!-- Completion glyph (hidden until done) -->
        <div class="done" id="done" aria-hidden="true">
          <span class="done__word">time</span>
          <span class="done__sub">that's the bell</span>
        </div>
      </div>

      <!-- Presets ring -->
      <div class="presets" id="presets">
        <button class="preset" data-min="0" data-sec="30">30s</button>
        <button class="preset" data-min="1" data-sec="0">1m</button>
        <button class="preset" data-min="5" data-sec="0">5m</button>
        <button class="preset" data-min="10" data-sec="0">10m</button>
        <button class="preset" data-min="25" data-sec="0">25m</button>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls" aria-label="controls">
      <button class="ctrl ctrl--ghost" id="resetBtn" aria-label="reset">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 3-6.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M3 4v5h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>reset</span>
      </button>

      <button class="ctrl ctrl--primary" id="primaryBtn" aria-label="start">
        <span class="ctrl__icon ctrl__icon--play" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M7 5l12 7-12 7z" fill="currentColor"/>
          </svg>
        </span>
        <span class="ctrl__icon ctrl__icon--pause" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <rect x="6" y="5" width="4" height="14" rx="1.2" fill="currentColor"/>
            <rect x="14" y="5" width="4" height="14" rx="1.2" fill="currentColor"/>
          </svg>
        </span>
        <span class="ctrl__label" id="primaryLabel">start</span>
      </button>

      <button class="ctrl ctrl--ghost" id="addBtn" aria-label="add 30 seconds">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span>+30s</span>
      </button>
    </section>

    <footer class="legend">
      <kbd>space</kbd> start / pause
      <span class="legend__sep">·</span>
      <kbd>R</kbd> reset
      <span class="legend__sep">·</span>
      <kbd>↑↓</kbd> nudge
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
